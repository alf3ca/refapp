services:
  - type: web
    name: refapp
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node ensure-chromium.js && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
    mounts:
      - path: /mnt/data
        diskName: refapp-data
        diskSizeGB: 1
