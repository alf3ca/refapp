services:
  - type: web
    name: refapp
    env: node
    plan: free
    # Install both system Chrome and NPM packages
    buildCommand: apt-get update && apt-get install -y chromium-browser && npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium-browser
      - key: PUPPETEER_CACHE_DIR
        value: /tmp/puppeteer-cache
    mounts:
      - path: /mnt/data
        diskName: refapp-data
        diskSizeGB: 1
