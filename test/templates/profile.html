<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Referee Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="nav-brand">⚽ Referee Portal</div>
            <div class="nav-menu">
                <a href="{{ url_for('dashboard') }}" class="nav-link">Dashboard</a>
                <a href="{{ url_for('referees_list') }}" class="nav-link">All Referees</a>
                <a href="{{ url_for('profile') }}" class="nav-link active">My Profile</a>
                <a href="{{ url_for('logout') }}" class="nav-link logout">Logout</a>
            </div>
        </nav>
        
        <div class="profile-container">
            <h1>My Profile</h1>
            
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar">{{ user.name[0] }}</div>
                    <div class="profile-info">
                        <h2>{{ user.name }}</h2>
                        <p>@{{ user.username }}</p>
                    </div>
                </div>
                
                <form id="profileForm" class="profile-form">
                    <div class="form-section">
                        <h3>Basic Information</h3>
                        
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input 
                                type="text" 
                                id="name" 
                                name="name" 
                                value="{{ user.name }}"
                                required
                            >
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                value="{{ user.email }}"
                                required
                            >
                        </div>
                        
                        <div class="form-group">
                            <label for="experience">Experience</label>
                            <input 
                                type="text" 
                                id="experience" 
                                name="experience" 
                                value="{{ user.experience }}"
                                placeholder="e.g., 10 years"
                            >
                        </div>
                        
                        <div class="form-group">
                            <label>Username</label>
                            <input 
                                type="text" 
                                value="{{ user.username }}"
                                disabled
                            >
                            <small>Username cannot be changed</small>
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Save Changes</button>
                        <a href="{{ url_for('dashboard') }}" class="btn-secondary">Cancel</a>
                    </div>
                </form>
                
                <div id="successMessage" class="success-message" style="display: none;">
                    Profile updated successfully!
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('profileForm');
        const successMessage = document.getElementById('successMessage');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                experience: document.getElementById('experience').value
            };
            
            try {
                const response = await fetch('{{ url_for("update_profile") }}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                if (response.ok) {
                    successMessage.style.display = 'block';
                    setTimeout(() => {
                        successMessage.style.display = 'none';
                    }, 3000);
                } else {
                    alert('Failed to update profile');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred');
            }
        });
    </script>
</body>
</html>
