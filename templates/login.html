<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referee Portal - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>⚽ Referee Portal</h1>
            <p class="subtitle">Official Referee Management System</p>
            
            {% if error %}
                <div class="error-message">{{ error }}</div>
            {% endif %}
            
            <form method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        required 
                        placeholder="Enter your username"
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required
                        placeholder="Enter your password"
                    >
                </div>
                
                <button type="submit" class="btn-login">Login</button>
            </form>
            
            <div class="auth-note">
                <h3>No account yet?</h3>
                <p>Create a referee account to access the portal.</p>
            </div>

            <div class="auth-footer">
                <a href="{{ url_for('register') }}" class="btn-secondary auth-btn">Create Account</a>
            </div>
        </div>
    </div>
</body>
</html>
